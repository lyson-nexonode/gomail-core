stages:
  - lint
  - test
  - build
  - docker

variables:
  GO_VERSION: "1.26"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  GOPATH: "$CI_PROJECT_DIR/.go"

lint:
  stage: lint
  image: golang:1.26-alpine
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .go/pkg/mod/
  before_script:
    - export PATH="$GOPATH/bin:$PATH"
    - apk add --no-cache git curl
    - go mod download
    - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/local/bin latest
  script:
    - golangci-lint run ./... --timeout 5m
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

test:
  stage: test
  image: golang:1.26
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .go/pkg/mod/
  before_script:
    - go mod download
  script:
    - CGO_ENABLED=1 go test ./... -v -race -coverprofile=coverage.out -covermode=atomic
    - go tool cover -func=coverage.out | tail -1
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.out
    paths:
      - coverage.out
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

build:
  stage: build
  image: golang:1.26-alpine
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .go/pkg/mod/
  before_script:
    - export PATH="$GOPATH/bin:$PATH"
    - apk add --no-cache git
    - go mod download
  script:
    - go build -ldflags="-w -s" -o bin/smtp ./cmd/smtp
    - go build -ldflags="-w -s" -o bin/imap ./cmd/imap
    - go build -ldflags="-w -s" -o bin/jmap ./cmd/jmap
    - echo "Build successful"
  artifacts:
    paths:
      - bin/
    expire_in: 1 day
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

docker:smtp:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -f docker/smtp.Dockerfile -t "$CI_REGISTRY_IMAGE/smtp:$CI_COMMIT_SHORT_SHA" .
    - docker tag "$CI_REGISTRY_IMAGE/smtp:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE/smtp:latest"
    - docker push "$CI_REGISTRY_IMAGE/smtp:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/smtp:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

docker:imap:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -f docker/imap.Dockerfile -t "$CI_REGISTRY_IMAGE/imap:$CI_COMMIT_SHORT_SHA" .
    - docker tag "$CI_REGISTRY_IMAGE/imap:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE/imap:latest"
    - docker push "$CI_REGISTRY_IMAGE/imap:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/imap:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

docker:jmap:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -f docker/jmap.Dockerfile -t "$CI_REGISTRY_IMAGE/jmap:$CI_COMMIT_SHORT_SHA" .
    - docker tag "$CI_REGISTRY_IMAGE/jmap:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE/jmap:latest"
    - docker push "$CI_REGISTRY_IMAGE/jmap:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/jmap:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
